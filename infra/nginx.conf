events { worker_connections 1024; }
http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  upstream web { server web:3000; }
  upstream api { server api:8000; }
  server {
    listen 80;
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'" always;
    location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ws/ { proxy_pass http://api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location / { proxy_pass http://web; proxy_set_header Host $host; }
  }
}

